<div *ngIf="vehicle as v; else noData" class="details-container">
  <img [src]="'http://localhost:5248' + vehicle.imageUrl" alt="vehicle image" />
  <div class="details-info">
    <h1>{{ v.brand }}</h1>
    <h2>{{ v.model }}</h2>
    <h3>Rs. {{ v.price.toLocaleString() }}</h3>
    <p><strong>Year:</strong> {{ v.year }}</p>
    <p><strong>Fuel:</strong> {{ v.fuelType }}</p>
    <p><strong>Color:</strong> {{ v.color }}</p>
    <p><strong>Mileage:</strong> {{ v.mileage }}</p>
    <p><strong>Reg:</strong> {{ v.registrationNumber }}</p>
  </div>
</div>
<ng-template #noData>
  <p>Vehicle Not Loaded</p>
</ng-template>
