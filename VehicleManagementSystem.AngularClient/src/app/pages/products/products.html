<section>
  <h1 class="title"> Vehicles </h1>
  <div class="view-buttons">
    <button (click)="setGridView()" id="gridBtn"><i class="fa-solid fa-border-all"></i></button>
    <button (click)="setListView()" id="vertBtn"><i class="fa-solid fa-grip-lines"></i></button>
  </div>
  <div class="product-filter">
    <article class="filters">
      <h2>Filters</h2>
      <!-- BRAND -->
      <div>
        <p>Brand</p>
        <input type="text" placeholder="e.g. Toyota" [(ngModel)]="brandFilter">
      </div>
      <!-- MODEL -->
      <div>
        <p>Model</p>
        <input type="text" placeholder="e.g. Corolla" [(ngModel)]="modelFilter">
      </div>
      <!-- YEAR -->
      <div>
        <p>Year</p>
        <div class="year-input">
          <input type="number" placeholder="e.g. 1900" [(ngModel)]="minYear">
          <input type="number" placeholder="e.g. 2030" [(ngModel)]="maxYear">
        </div>
      </div>
      <!-- PRICE -->
      <div>
        <p>Price</p>
        <div class="price-input">
          <input type="number" placeholder="5000" [(ngModel)]="minPrice">
          <input type="number" placeholder="500000000" [(ngModel)]="maxPrice">
        </div>
      </div>
      <!-- MILEAGE -->
      <div>
        <p>Mileage</p>
        <div class="mileage-input">
          <input type="number" placeholder="100" [(ngModel)]="minMileage">
          <input type="number" placeholder="1000000" [(ngModel)]="maxMileage">
        </div>
      </div>
      <!-- FUEL TYPE -->
      <div>
        <p>Fuel Type</p>
        <input type="text" placeholder="e.g. Petrol" [(ngModel)]="fuelFilter">
      </div>
      <!-- COLOR -->
      <div>
        <p>Color</p>
        <input type="text" placeholder="e.g. Blue" [(ngModel)]="colorFilter">
      </div>
      <!-- BUTTON -->
      <button (click)="applyFilters()"> Apply Filters </button>
    </article>
    <!-- VEHICLE LIST -->
    <app-vehicle-list 
      [vehicles]="filteredVehicles"
      [viewMode]="viewMode">
    </app-vehicle-list>
  </div>
</section>
